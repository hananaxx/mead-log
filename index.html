<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mead Log</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#F59E0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mead Log">
  <link rel="apple-touch-icon" href="icon-180.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #FFFBEB;
      color: #1C1917;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; min-height: 100vh; }
    .screen.active { display: flex; }

    /* ── Header ── */
    .header {
      background: #F59E0B;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(245,158,11,0.3);
    }
    .header h1 { font-size: 19px; font-weight: 700; flex: 1; }
    .back-btn {
      background: none; border: none; color: white;
      font-size: 22px; cursor: pointer; padding: 2px 6px 2px 0; line-height: 1;
    }
    .map-btn {
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      color: white; padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }

    /* ── Content ── */
    .content { flex: 1; padding: 16px; padding-bottom: 90px; overflow-y: auto; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 28px; right: 20px;
      width: 56px; height: 56px; background: #F59E0B; color: white;
      border: none; border-radius: 50%; font-size: 30px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(245,158,11,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 20; line-height: 1;
    }

    /* ── Mead Cards ── */
    .mead-card {
      background: white; border-radius: 14px; padding: 12px;
      margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border: 1px solid #FDE68A; cursor: pointer;
      display: flex; align-items: center; gap: 12px; transition: opacity 0.15s;
    }
    .mead-card:active { opacity: 0.7; }
    .card-thumb {
      width: 64px; height: 64px; border-radius: 10px;
      object-fit: cover; flex-shrink: 0; background: #FEF3C7;
    }
    .card-thumb-placeholder {
      width: 64px; height: 64px; flex-shrink: 0;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-brewery { font-size: 13px; color: #78716C; margin-top: 2px; }
    .card-meta { font-size: 12px; color: #A8A29E; margin-top: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* ── Badges ── */
    .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .badge-traditional { background: #FEF3C7; color: #92400E; }
    .badge-melomel     { background: #FEE2E2; color: #991B1B; }
    .badge-metheglin   { background: #D1FAE5; color: #065F46; }
    .badge-braggot     { background: #DBEAFE; color: #1E40AF; }
    .badge-other       { background: #F3F4F6; color: #374151; }

    /* ── Empty State ── */
    .empty { text-align: center; padding: 64px 24px; color: #A8A29E; }
    .empty .icon { font-size: 72px; margin-bottom: 16px; }
    .empty p { font-size: 15px; line-height: 1.7; }

    /* ── Section title ── */
    .section-title {
      font-size: 11px; font-weight: 700; color: #A8A29E;
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; margin-top: 4px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 700; color: #78716C;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #FDE68A;
      border-radius: 12px; font-size: 16px; background: white;
      outline: none; transition: border-color 0.2s; font-family: inherit;
    }
    .form-input:focus { border-color: #F59E0B; }
    textarea.form-input { min-height: 80px; resize: vertical; line-height: 1.5; }

    /* ── Photo input ── */
    .photo-zone {
      position: relative;
      width: 100%;
      border-radius: 14px;
      border: 2px dashed #FDE68A;
      background: #FFFDF7;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .photo-zone:active { border-color: #F59E0B; }
    .photo-zone input[type=file] {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; z-index: 2;
    }
    .photo-zone-inner {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; gap: 6px; pointer-events: none;
    }
    .photo-zone-inner .pz-icon { font-size: 36px; }
    .photo-zone-inner .pz-text { font-size: 14px; color: #92400E; font-weight: 600; }
    .photo-zone-inner .pz-sub  { font-size: 12px; color: #A8A29E; }
    .photo-preview-img {
      width: 100%; max-height: 220px;
      object-fit: cover; border-radius: 12px;
      display: none;
    }
    .photo-remove-btn {
      display: none; width: 100%; margin-top: 8px;
      padding: 8px; background: white; color: #DC2626;
      border: 1.5px solid #DC2626; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }

    /* ── Style Selector ── */
    .style-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .style-pill {
      padding: 8px 14px; border-radius: 20px; border: 1.5px solid #FDE68A;
      background: white; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; color: #78716C;
    }
    .style-pill.selected { background: #F59E0B; border-color: #F59E0B; color: white; }

    /* ── Quad Map ── */
    .quad-wrap { width: 100%; }
    .quad-canvas {
      display: block; width: 100%; aspect-ratio: 1;
      border-radius: 14px; border: 1.5px solid #FDE68A;
      cursor: crosshair; touch-action: none;
    }
    .quad-hint { font-size: 11px; color: #A8A29E; text-align: center; margin-top: 6px; }

    /* ── Sliders ── */
    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .slider-label { font-size: 14px; width: 84px; flex-shrink: 0; color: #57534E; }
    input[type=range] {
      flex: 1; -webkit-appearance: none; height: 6px;
      border-radius: 3px; background: #FDE68A; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
      background: #F59E0B; cursor: pointer; box-shadow: 0 2px 8px rgba(245,158,11,0.45);
    }
    .slider-val { font-size: 17px; font-weight: 700; color: #D97706; width: 20px; text-align: right; }

    /* ── Cards ── */
    .chart-card {
      background: white; border-radius: 14px; padding: 16px;
      border: 1px solid #FDE68A; margin-bottom: 16px;
    }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; padding: 16px; background: #F59E0B; color: white;
      border: none; border-radius: 14px; font-size: 17px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
    }
    .btn-primary:active { opacity: 0.8; }
    .action-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .btn-edit {
      flex: 1; padding: 14px; background: #F59E0B; color: white;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .btn-delete {
      padding: 14px 20px; background: white; color: #DC2626;
      border: 1.5px solid #DC2626; border-radius: 12px;
      font-size: 16px; cursor: pointer; font-weight: 600;
    }

    /* ── Detail ── */
    .detail-photo {
      width: 100%; max-height: 240px; object-fit: cover;
      border-radius: 14px; margin-bottom: 12px; display: none;
    }
    .detail-card {
      background: white; border-radius: 14px; padding: 16px;
      border: 1px solid #FDE68A; margin-bottom: 16px;
    }
    .detail-name    { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .detail-brewery { font-size: 14px; color: #78716C; }
    .detail-date    { font-size: 13px; color: #A8A29E; margin-top: 8px; }
    .detail-url {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 10px; font-size: 13px; color: #D97706;
      font-weight: 600; text-decoration: none; word-break: break-all;
    }
    .detail-url:active { opacity: 0.7; }

    /* ── Notes ── */
    .notes-card { background: white; border-radius: 14px; padding: 14px; border: 1px solid #FDE68A; }
    .notes-text { font-size: 14px; line-height: 1.7; white-space: pre-wrap; color: #1C1917; }

    /* ── Map legend ── */
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #78716C; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── OCR ── */
    .ocr-btn {
      display: none; width: 100%; margin-top: 8px;
      padding: 10px; background: white; color: #92400E;
      border: 1.5px solid #F59E0B; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .ocr-btn:disabled { opacity: 0.5; }
    .ocr-status { font-size: 12px; color: #A8A29E; margin-top: 6px; min-height: 16px; }
    .ocr-results { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .ocr-chip {
      padding: 8px 12px; border-radius: 16px; border: 1.5px solid #FDE68A;
      background: white; font-size: 13px; cursor: pointer; color: #1C1917;
      max-width: 100%; word-break: break-word; text-align: left;
    }
    .ocr-chip.used { background: #F59E0B; border-color: #F59E0B; color: white; }

    /* ── Tags ── */
    .d-tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .d-tag {
      font-size: 12px; font-weight: 600; padding: 3px 10px;
      border-radius: 12px; background: #FEF3C7; color: #92400E;
    }

    /* ── Backup ── */
    .backup-card {
      background: white; border-radius: 14px; padding: 14px;
      border: 1px solid #FDE68A; margin-top: 20px;
    }
    .backup-btns { display: flex; gap: 10px; }
    .backup-btn {
      flex: 1; padding: 12px 4px; background: #FFFDF7; color: #92400E;
      border: 1.5px solid #FDE68A; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
    }
    .backup-btn:active { background: #FEF3C7; }
    .backup-hint { font-size: 11px; color: #A8A29E; margin-top: 8px; line-height: 1.6; }

    /* ── Lock screen ── */
    #lock-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #FFFBEB;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 32px;
    }
    .lock-icon  { font-size: 64px; }
    .lock-title { font-size: 22px; font-weight: 700; color: #92400E; }
    .lock-sub   { font-size: 14px; color: #A8A29E; margin-top: -16px; }
    .pass-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
    .pass-input {
      padding: 14px 16px; border-radius: 14px;
      border: 1.5px solid #FDE68A; background: white;
      font-size: 16px; text-align: center; color: #1C1917;
      outline: none;
    }
    .pass-input:focus { border-color: #F59E0B; }
    .pass-btn {
      padding: 14px 0; border-radius: 14px; border: none;
      background: #F59E0B; color: white;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .pass-btn:active { opacity: 0.85; }
    .lock-error {
      font-size: 14px; color: #DC2626; font-weight: 600;
      min-height: 20px;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════
     LOCK SCREEN
════════════════════════════════ -->
<div id="lock-screen">
  <div class="lock-icon">🍯</div>
  <div class="lock-title">Mead Log</div>
  <div class="lock-sub">合言葉を入力してください</div>
  <div class="lock-error" id="lock-error"></div>
  <form class="pass-form" onsubmit="checkPass(event)">
    <input type="password" class="pass-input" id="pass-input" placeholder="合言葉" autocomplete="current-password">
    <button type="submit" class="pass-btn">開ける</button>
  </form>
</div>

<!-- ═══════════════════════════════
     HOME SCREEN
════════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="header">
    <h1>🍯 Mead Log</h1>
    <button class="map-btn" onclick="showScreen('map')">マップで見る</button>
  </div>
  <div class="content" id="home-list"></div>
  <button class="fab" onclick="openAdd()" title="記録する">＋</button>
</div>

<!-- ═══════════════════════════════
     MAP VIEW SCREEN
════════════════════════════════ -->
<div id="screen-map" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <h1>味のマップ</h1>
  </div>
  <div class="content">
    <div class="quad-wrap">
      <canvas id="map-canvas" class="quad-canvas" style="cursor:default;"></canvas>
    </div>
    <div class="legend" id="map-legend"></div>
  </div>
</div>

<!-- ═══════════════════════════════
     ADD / EDIT SCREEN
════════════════════════════════ -->
<div id="screen-edit" class="screen">
  <div class="header">
    <button class="back-btn" onclick="cancelEdit()">←</button>
    <h1 id="edit-title">ミードを記録</h1>
  </div>
  <div class="content">

    <!-- 写真 -->
    <div class="form-group">
      <label>写真（ラベルや外観）</label>
      <div class="photo-zone" id="photo-zone">
        <input type="file" accept="image/*" capture="environment" id="f-photo" onchange="handlePhoto(this)">
        <div class="photo-zone-inner" id="photo-placeholder">
          <div class="pz-icon">📷</div>
          <div class="pz-text">タップして撮影 / 選択</div>
          <div class="pz-sub">ボトルのラベルを記録しておこう</div>
        </div>
        <img id="photo-preview-img" class="photo-preview-img" alt="プレビュー">
      </div>
      <button class="photo-remove-btn" id="photo-remove-btn" onclick="removePhoto()">写真を削除</button>
      <button class="ocr-btn" id="ocr-btn" onclick="runOcr()">🔎 ラベルの文字を読み取る</button>
      <p class="ocr-status" id="ocr-status"></p>
      <div class="ocr-results" id="ocr-results"></div>
    </div>

    <!-- 基本情報 -->
    <div class="form-group">
      <label>ミード名 *</label>
      <input type="text" class="form-input" id="f-name" placeholder="例: Orange Blossom Mead">
    </div>

    <div class="form-group">
      <label>醸造元 / ブルワリー</label>
      <input type="text" class="form-input" id="f-brewery" placeholder="例: Wild Blossom Meadery">
    </div>

    <div class="form-group">
      <label>醸造元のURL（公式サイトなど）</label>
      <input type="url" class="form-input" id="f-url" placeholder="https://example.com">
    </div>

    <div class="form-group">
      <label>飲んだ日</label>
      <input type="date" class="form-input" id="f-date">
    </div>

    <div class="form-group">
      <label>スタイル</label>
      <div class="style-pills">
        <button class="style-pill" data-style="traditional" onclick="pickStyle(this)">トラディショナル</button>
        <button class="style-pill" data-style="melomel"     onclick="pickStyle(this)">メロメル</button>
        <button class="style-pill" data-style="metheglin"   onclick="pickStyle(this)">メテグリン</button>
        <button class="style-pill" data-style="braggot"     onclick="pickStyle(this)">ブラゴット</button>
        <button class="style-pill" data-style="other"       onclick="pickStyle(this)">その他</button>
      </div>
    </div>

    <div class="form-group">
      <label>味タグ（当てはまるものをタップ・複数可）</label>
      <div class="style-pills" id="tag-pills"></div>
    </div>

    <div class="form-group">
      <label>マップの位置（タップして指定）</label>
      <div class="quad-wrap">
        <canvas id="edit-canvas" class="quad-canvas"></canvas>
      </div>
      <p class="quad-hint">タップ / ドラッグで位置を指定してください</p>
    </div>

    <div class="form-group">
      <label>テイスティング スコア</label>
      <div class="chart-card">
        <canvas id="edit-radar" height="200"></canvas>
      </div>
      <div id="sliders"></div>
    </div>

    <div class="form-group">
      <label>コメント・メモ</label>
      <textarea class="form-input" id="f-notes"
        placeholder="香りの印象、合わせた料理、出会った場所など…"></textarea>
    </div>

    <button class="btn-primary" onclick="saveMead()">保存する</button>
  </div>
</div>

<!-- ═══════════════════════════════
     DETAIL SCREEN
════════════════════════════════ -->
<div id="screen-detail" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <h1>詳細</h1>
  </div>
  <div class="content">

    <!-- 写真（あれば） -->
    <img id="d-photo" class="detail-photo" alt="ラベル写真">

    <div class="detail-card">
      <div class="detail-name"    id="d-name"></div>
      <div class="detail-brewery" id="d-brewery"></div>
      <div style="margin-top:8px;"><span id="d-badge" class="badge"></span></div>
      <div class="d-tag-row" id="d-tags"></div>
      <div class="detail-date"    id="d-date"></div>
      <a id="d-url" class="detail-url" href="#" target="_blank" rel="noopener" style="display:none;">
        🔗 <span id="d-url-text"></span>
      </a>
    </div>

    <div class="action-row">
      <button class="btn-edit"   onclick="openEdit(currentId)">編集</button>
      <button class="btn-delete" onclick="deleteMead(currentId)">削除</button>
    </div>

    <p class="section-title">レーダーチャート</p>
    <div class="chart-card">
      <canvas id="detail-radar" height="220"></canvas>
    </div>

    <p class="section-title">マップ上の位置</p>
    <div class="quad-wrap" style="margin-bottom:16px;">
      <canvas id="detail-quad" class="quad-canvas" style="cursor:default;"></canvas>
    </div>

    <div id="d-notes-wrap" class="notes-card" style="display:none;">
      <p class="section-title" style="margin-top:0;">コメント・メモ</p>
      <p class="notes-text" id="d-notes"></p>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════
     JAVASCRIPT
════════════════════════════════ -->
<script>
'use strict';

/* ────────────────────────────────
   DATA
──────────────────────────────── */
const KEY = 'meadLog_v2';
const SCORE_KEYS   = ['sweetness','acidity','aroma','fruity','finish'];
const SCORE_LABELS = ['甘み','酸味','香り','フルーティさ','余韻'];
const STYLES = {
  traditional: 'トラディショナル',
  melomel:     'メロメル',
  metheglin:   'メテグリン',
  braggot:     'ブラゴット',
  other:       'その他',
};
const DOT_COLORS = {
  traditional: '#F59E0B',
  melomel:     '#EF4444',
  metheglin:   '#10B981',
  braggot:     '#3B82F6',
  other:       '#8B5CF6',
};

const TAGS = ['花の香り','柑橘','ベリー','りんご','スパイス','樽香','微発泡','濃厚','すっきり','デザート向き'];

let meads     = [];
let currentId = null;

// Edit state
let editId    = null;
let editPos   = { x: 0.5, y: 0.5 };
let editStyle = 'traditional';
let editChart = null;
let editPhoto = null;  // base64 or null
let editTags  = [];

function load() { try { meads = JSON.parse(localStorage.getItem(KEY)) || []; } catch { meads = []; } }
function save() {
  try {
    localStorage.setItem(KEY, JSON.stringify(meads));
  } catch(e) {
    alert('保存容量が不足しています。古い記録を削除するか、写真のサイズを小さくしてください。');
  }
}
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ────────────────────────────────
   PHOTO HANDLING
──────────────────────────────── */
function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  compressImage(file, base64 => {
    editPhoto = base64;
    showPhotoPreview(base64);
  });
}

function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.78));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

      <div class="backup-btns">

      <p class="backup-hint">記録はこのスマホの中だけに保存されています。機種変更や消失に備えて、ときどき「書き出す」でファイルを保存しておきましょう。</p>
    </div>`;
}

function renderHome() {
  const el = document.getElementById('home-list');
  if (!meads.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="icon">🍯</div>
        <p>まだミードの記録がありません。<br>「＋」ボタンで最初の記録を追加しよう！</p>
      </div>` + backupCardHtml();
    return;
  }

  const sorted = [...meads].sort((a,b) => b.date.localeCompare(a.date));
  el.innerHTML = sorted.map(m => {
    const thumb = m.photo
      ? `<img class="card-thumb" src="${m.photo}" alt="ラベル">`
      : `<canvas class="card-thumb-placeholder" id="mini-${m.id}" width="64" height="64"></canvas>`;
    return `
      <div class="mead-card" onclick="openDetail('${m.id}')">
        ${thumb}
        <div class="card-info">
          <div class="card-name">${esc(m.name)}</div>
          <div class="card-brewery">${esc(m.brewery || '醸造元不明')}</div>
          <div class="card-meta">
            <span class="badge badge-${m.style}">${STYLES[m.style]||m.style}</span>
            <span>${m.date}</span>
          </div>
        </div>
      </div>`;
  }).join('') + backupCardHtml();

  // ミニレーダー（写真なしのものだけ）
  setTimeout(() => {
    sorted.filter(m => !m.photo).forEach(m => {
      const c = document.getElementById('mini-' + m.id);
      if (c) drawMiniRadar(c, m.scores);
    });
  }, 30);
}

function drawMiniRadar(canvas, scores) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 32, cy = 32, r = 24, n = 5;
  ctx.clearRect(0, 0, 64, 64);
  [0.25,0.5,0.75,1].forEach(s => {
    ctx.beginPath(); ctx.strokeStyle = '#FDE68A'; ctx.lineWidth = 0.6;
    for (let i = 0; i < n; i++) {
      const a = (i/n)*Math.PI*2 - Math.PI/2;
      const x = cx + Math.cos(a)*r*s, y = cy + Math.sin(a)*r*s;
      i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
    }
    ctx.closePath(); ctx.stroke();
  });
  ctx.beginPath();
  ctx.fillStyle = 'rgba(245,158,11,0.25)'; ctx.strokeStyle = '#F59E0B'; ctx.lineWidth = 1.5;
  SCORE_KEYS.forEach((k,i) => {
    const v = ((scores[k]||3)-1)/4;
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    const x = cx + Math.cos(a)*r*v, y = cy + Math.sin(a)*r*v;
    i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
  });
  ctx.closePath(); ctx.fill(); ctx.stroke();
}

let detailChart = null;

function openDetail(id) {
  const m = meads.find(x => x.id === id);
  if (!m) return;
  currentId = id;

  // 写真
  const dPhoto = document.getElementById('d-photo');
  if (m.photo) {
    dPhoto.src = m.photo;
    dPhoto.style.display = 'block';
  } else {
    dPhoto.style.display = 'none';
    dPhoto.src = '';
  }

  document.getElementById('d-name').textContent    = m.name;
  document.getElementById('d-brewery').textContent = m.brewery || '';
  document.getElementById('d-date').textContent    = m.date;

  const badge = document.getElementById('d-badge');
  badge.textContent = STYLES[m.style] || m.style;
  badge.className   = `badge badge-${m.style}`;

  // 味タグ
  const tagRow = document.getElementById('d-tags');
  tagRow.innerHTML = (m.tags || []).map(t => `<span class="d-tag">${esc(t)}</span>`).join('');

  // URL
  const urlEl    = document.getElementById('d-url');
  const urlText  = document.getElementById('d-url-text');
  if (m.url) {
    urlEl.href         = m.url;
    urlText.textContent = m.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
    urlEl.style.display = 'inline-flex';
  } else {
    urlEl.style.display = 'none';
  }

  const nw = document.getElementById('d-notes-wrap');
  if (m.notes) {
    nw.style.display = 'block';
    document.getElementById('d-notes').textContent = m.notes;
  } else {
    nw.style.display = 'none';
  }

  showScreen('detail');
  setTimeout(() => { renderDetailRadar(m); renderDetailQuad(m); }, 80);
}

function renderDetailRadar(m) {
  if (detailChart) { detailChart.destroy(); detailChart = null; }
  detailChart = makeRadarChart('detail-radar', SCORE_KEYS.map(k => m.scores[k]||3));
}

function renderDetailQuad(m) {
  const canvas = document.getElementById('detail-quad');
  resizeCanvas(canvas);
  const ctx = canvas.getContext('2d');
  const w = canvas.offsetWidth || 300;
  drawQuadBase(ctx, w, w);
  drawDot(ctx, m.position.x * w, m.position.y * w, '#F59E0B', 13);
}

  editId = id; editPos = {...m.position}; editStyle = m.style; editPhoto = m.photo || null;

  const vals = SCORE_KEYS.map(k => m.scores[k]||3);
  buildSliders(vals);
  showScreen('edit');
  setTimeout(() => { initEditCanvas(); initEditRadar(vals); }, 80);
}

function cancelEdit() { showScreen('home'); }

function pickStyle(btn) {
  document.querySelectorAll('.style-pill').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  editStyle = btn.dataset.style;
}

function buildSliders(vals) {
  document.getElementById('sliders').innerHTML = SCORE_KEYS.map((k,i) => `
    <div class="slider-row">
      <span class="slider-label">${SCORE_LABELS[i]}</span>
      <input type="range" id="s-${k}" min="1" max="5" value="${vals[i]}"
        oninput="onSlider('${k}', this.value)">
      <span class="slider-val" id="v-${k}">${vals[i]}</span>
    </div>`).join('');
}

function onSlider(key, val) {
  document.getElementById('v-' + key).textContent = val;
  if (editChart) {
    editChart.data.datasets[0].data = SCORE_KEYS.map(k => +document.getElementById('s-'+k).value);
    editChart.update('none');
  }
}

function saveMead() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('ミード名を入力してください'); return; }

  const scores = {};
  SCORE_KEYS.forEach(k => scores[k] = +document.getElementById('s-'+k).value);

  const m = {
    id:       editId || uid(),
    name,
    brewery:  document.getElementById('f-brewery').value.trim(),
    url:      document.getElementById('f-url').value.trim(),
    date:     document.getElementById('f-date').value || today(),
    style:    editStyle,
    position: {...editPos},
    scores,
    tags:     [...editTags],
    notes:    document.getElementById('f-notes').value.trim(),
    photo:    editPhoto,
  };

  if (editId) {
    const i = meads.findIndex(x => x.id === editId);
    if (i !== -1) meads[i] = m; else meads.push(m);
  } else {
    meads.push(m);
  }
  save();
  if (editId) { currentId = editId; openDetail(currentId); }
  else        { showScreen('home'); }
}

function deleteMead(id) {
  const m = meads.find(x => x.id === id);
  if (!m) return;
  if (!confirm(`「${m.name}」を削除しますか？`)) return;
  meads = meads.filter(x => x.id !== id);
  save();
  showScreen('home');
}

/* ────────────────────────────────
   EDIT CANVAS (quad map)
──────────────────────────────── */
let editCanvas = null;
let editCtx    = null;

function initEditCanvas() {
  // クローンで古いイベントリスナーを除去してから resize → draw
  const old = document.getElementById('edit-canvas');
  const newCanvas = old.cloneNode(false);
  newCanvas.id = 'edit-canvas';
  old.parentNode.replaceChild(newCanvas, old);
  editCanvas = newCanvas;

  resizeCanvas(editCanvas);
  editCtx = editCanvas.getContext('2d');
  drawEditQuad();

  editCanvas.addEventListener('click', e => {
    const rc = editCanvas.getBoundingClientRect();
    setEditPos((e.clientX - rc.left) / rc.width, (e.clientY - rc.top) / rc.height);
  });
  editCanvas.addEventListener('touchend', e => {
    e.preventDefault();
    const t = e.changedTouches[0], rc = editCanvas.getBoundingClientRect();
    setEditPos((t.clientX - rc.left) / rc.width, (t.clientY - rc.top) / rc.height);
  }, { passive: false });
  let dragging = false;
  editCanvas.addEventListener('mousedown', () => dragging = true);
  window.addEventListener('mouseup',      () => dragging = false);
  editCanvas.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rc = editCanvas.getBoundingClientRect();
    setEditPos((e.clientX - rc.left) / rc.width, (e.clientY - rc.top) / rc.height);
  });
  editCanvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0], rc = editCanvas.getBoundingClientRect();
    setEditPos((t.clientX - rc.left) / rc.width, (t.clientY - rc.top) / rc.height);
  }, { passive: false });
}

function setEditPos(x, y) {
  editPos = { x: Math.max(0.02, Math.min(0.98, x)), y: Math.max(0.02, Math.min(0.98, y)) };
  drawEditQuad();
}

function drawEditQuad() {
  const w = editCanvas.offsetWidth || 300;
  editCtx.clearRect(0, 0, w, w);
  drawQuadBase(editCtx, w, w);
  drawDot(editCtx, editPos.x * w, editPos.y * w, '#F59E0B', 11);
}

/* ────────────────────────────────
   RADAR CHART
──────────────────────────────── */
function initEditRadar(vals) {
  if (editChart) { editChart.destroy(); editChart = null; }
  editChart = makeRadarChart('edit-radar', vals);
}

function makeRadarChart(canvasId, data) {
  return new Chart(document.getElementById(canvasId), {
    type: 'radar',
    data: {
      labels: SCORE_LABELS,
      datasets: [{
        data,
        backgroundColor: 'rgba(245,158,11,0.18)',
        borderColor: '#F59E0B', borderWidth: 2,
        pointBackgroundColor: '#F59E0B', pointRadius: 5, pointHoverRadius: 7,
      }]
    },
    options: {
      responsive: true,
      scales: {
        r: {
          min: 0, max: 5,
          ticks: { stepSize: 1, display: false },
          grid: { color: '#FDE68A' }, angleLines: { color: '#FDE68A' },
          pointLabels: { font: { size: 13, weight: '600' }, color: '#78350F' },
        }
      },
      plugins: { legend: { display: false } },
      animation: { duration: 200 },
    }
  });
}

/* ────────────────────────────────
   MAP VIEW
──────────────────────────────── */
function renderMapView() {
  const canvas = document.getElementById('map-canvas');
  resizeCanvas(canvas);
  const ctx = canvas.getContext('2d');
  const w = canvas.offsetWidth || 300, h = w;

  drawQuadBase(ctx, w, h);

  meads.forEach(m => {
    const color = DOT_COLORS[m.style] || '#F59E0B';
    const px = m.position.x * w, py = m.position.y * h;
    drawDot(ctx, px, py, color, 9);
    ctx.save();
    ctx.font = `${Math.round(w*0.033)}px -apple-system, sans-serif`;
    ctx.fillStyle = '#1C1917'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(m.name.length > 7 ? m.name.slice(0,7)+'…' : m.name, px, py + 12);
    ctx.restore();
  });

  canvas.onclick = e => {
    const rc2 = canvas.getBoundingClientRect();
    const mx = e.clientX - rc2.left, my = e.clientY - rc2.top;
    let best = null, bestD = 35;
    meads.forEach(m => {
      const d = Math.hypot(m.position.x * w - mx, m.position.y * h - my);
      if (d < bestD) { bestD = d; best = m; }
    });
    if (best) openDetail(best.id);
  };

  const leg = document.getElementById('map-legend');
  const used = [...new Set(meads.map(m => m.style))];
  leg.innerHTML = used.map(s => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${DOT_COLORS[s]||'#999'}"></div>
      <span>${STYLES[s]||s}</span>
    </div>`).join('');
}

/* ────────────────────────────────
   CANVAS HELPERS
──────────────────────────────── */
function resizeCanvas(canvas) {
  const size = canvas.offsetWidth || canvas.parentElement.offsetWidth || 300;
  const dpr  = window.devicePixelRatio || 1;
  canvas.width  = size * dpr;
  canvas.height = size * dpr;
  canvas.getContext('2d').scale(dpr, dpr);
}

function drawQuadBase(ctx, w, h) {
  ctx.fillStyle = '#FFFDF7';
  ctx.fillRect(0, 0, w, h);

  [['#FFFDE7',0,0],['#FFF8E1',w/2,0],['#FFF3E0',0,h/2],['#FEF9C3',w/2,h/2]].forEach(([c,x,y]) => {
    ctx.fillStyle = c; ctx.fillRect(x, y, w/2, h/2);
  });

  ctx.save();
  ctx.strokeStyle = '#FDE68A'; ctx.lineWidth = 1; ctx.setLineDash([5,5]);
  ctx.beginPath();
  ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2);
  ctx.stroke(); ctx.restore();

  ctx.strokeStyle = '#D97706'; ctx.lineWidth = 1.5; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(w/2,4); ctx.lineTo(w/2,h-4); ctx.moveTo(4,h/2); ctx.lineTo(w-4,h/2);
  ctx.stroke();

  const arr = (x, y, dir) => {
    const s = 5; ctx.beginPath(); ctx.fillStyle = '#D97706';
    if (dir==='up')    { ctx.moveTo(x,y-s); ctx.lineTo(x-s,y+s); ctx.lineTo(x+s,y+s); }
    if (dir==='down')  { ctx.moveTo(x,y+s); ctx.lineTo(x-s,y-s); ctx.lineTo(x+s,y-s); }
    if (dir==='left')  { ctx.moveTo(x-s,y); ctx.lineTo(x+s,y-s); ctx.lineTo(x+s,y+s); }
    if (dir==='right') { ctx.moveTo(x+s,y); ctx.lineTo(x-s,y-s); ctx.lineTo(x-s,y+s); }
    ctx.closePath(); ctx.fill();
  };
  arr(w/2,5,'up'); arr(w/2,h-5,'down'); arr(5,h/2,'left'); arr(w-5,h/2,'right');

  const fs = Math.max(11, Math.round(w*0.038));
  ctx.font = `700 ${fs}px -apple-system, sans-serif`; ctx.fillStyle = '#92400E';
  ctx.textAlign='center'; ctx.textBaseline='top';    ctx.fillText('蜂蜜感 強い', w/2, 8);
  ctx.textBaseline='bottom';                         ctx.fillText('蜂蜜感 弱い', w/2, h-8);
  ctx.textAlign='left';   ctx.textBaseline='middle'; ctx.fillText('辛口', 10, h/2);
  ctx.textAlign='right';                             ctx.fillText('甘口', w-10, h/2);

  const sf = Math.max(9, Math.round(w*0.028));
  ctx.font = `${sf}px -apple-system, sans-serif`; ctx.fillStyle = '#C4A04A';
  ctx.textAlign='left';  ctx.textBaseline='top';    ctx.fillText('ドライ×フローラル',    8,   8+fs+2);
  ctx.textAlign='right'; ctx.textBaseline='top';    ctx.fillText('スウィート×フローラル', w-8, 8+fs+2);
  ctx.textAlign='left';  ctx.textBaseline='bottom'; ctx.fillText('ドライ×サブトル',      8,   h-8-fs-2);
  ctx.textAlign='right'; ctx.textBaseline='bottom'; ctx.fillText('スウィート×サブトル',  w-8, h-8-fs-2);
}

function drawDot(ctx, px, py, color, r) {
  ctx.save();
  ctx.shadowColor = color; ctx.shadowBlur = 10;
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0; ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(px, py, r*0.35, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

/* ────────────────────────────────
   UTILS
──────────────────────────────── */
function today() { return new Date().toISOString().slice(0,10); }

/* ────────────────────────────────
   TASTE TAGS
──────────────────────────────── */
function buildTagPills() {
  document.getElementById('tag-pills').innerHTML = TAGS.map(t => `
    <button class="style-pill${editTags.includes(t) ? ' selected' : ''}"
      onclick="toggleTag(this)" data-tag="${esc(t)}">${esc(t)}</button>`).join('');
}

function toggleTag(btn) {
  const t = btn.dataset.tag;
  if (editTags.includes(t)) {
    editTags = editTags.filter(x => x !== t);
    btn.classList.remove('selected');
  } else {
    editTags.push(t);
    btn.classList.add('selected');
  }
}

/* ────────────────────────────────
   BACKUP (export / import)
──────────────────────────────── */
function exportData() {
  const payload = { app: 'mead-log', version: 1, exported: new Date().toISOString(), meads };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mead-log-backup-${today()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    input.value = '';
    let list;
    try {
      const data = JSON.parse(e.target.result);
      list = Array.isArray(data) ? data : data.meads;
      if (!Array.isArray(list)) throw new Error();
    } catch {
      alert('このファイルは読み込めませんでした。「書き出す」で保存したファイルを選んでください。');
      return;
    }
    const valid = list.filter(m => m && m.id && m.name);
    if (!valid.length) { alert('記録が見つかりませんでした。'); return; }
    if (!confirm(`${valid.length}件の記録が見つかりました。読み込みますか？\n（同じ記録がある場合はファイルの内容で上書きされます）`)) return;
    valid.forEach(m => {
      const i = meads.findIndex(x => x.id === m.id);
      if (i !== -1) meads[i] = m; else meads.push(m);
    });
    save();
    renderHome();
    alert('読み込みが完了しました！');
  };
  reader.readAsText(file);
}

/* ────────────────────────────────
   OCR (ラベル文字読み取り / Tesseract.js)
──────────────────────────────── */
function clearOcrUi() {
  const btn = document.getElementById('ocr-btn');
  btn.style.display = 'none';
  btn.disabled = false;
  document.getElementById('ocr-status').textContent = '';
  document.getElementById('ocr-results').innerHTML = '';
}

function loadTesseract() {
  return new Promise((resolve, reject) => {
    if (window.Tesseract) return resolve();
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('script load failed'));
    document.head.appendChild(s);
  });
}

async function runOcr() {
  if (!editPhoto) return;
  const btn    = document.getElementById('ocr-btn');
  const status = document.getElementById('ocr-status');
  const box    = document.getElementById('ocr-results');
  btn.disabled = true;
  box.innerHTML = '';
  status.textContent = '準備中…（初回は読み取り用データの取得に少し時間がかかります）';
  try {
    await loadTesseract();
    const worker = await Tesseract.createWorker('jpn+eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          status.textContent = `文字を読み取り中… ${Math.round(m.progress * 100)}%`;
        }
      }
    });
    const { data } = await worker.recognize(editPhoto);
    await worker.terminate();
    const lines = (data.text || '')
      .split('\n')
      .map(s => s.replace(/\s+/g, ' ').trim())
      .filter(s => s.replace(/[^0-9A-Za-zぁ-んァ-ヶ一-龠ー]/g, '').length >= 2)
      .slice(0, 8);
    if (!lines.length) {
      status.textContent = '文字を読み取れませんでした。ラベルが大きく写るように撮り直してみてください。';
    } else {
      status.textContent = '読み取れた行をタップすると入力されます（空いている方の欄: ミード名→醸造元）';
      box.innerHTML = lines.map(l => `<button class="ocr-chip" onclick="useOcrText(this)">${esc(l)}</button>`).join('');
    }
  } catch (err) {
    status.textContent = '読み取りに失敗しました。電波の良い場所でもう一度試してください。';
  }
  btn.disabled = false;
}

function useOcrText(chip) {
  const text    = chip.textContent;
  const nameEl  = document.getElementById('f-name');
  const brewEl  = document.getElementById('f-brewery');
  let target;
  if (!nameEl.value.trim())      target = nameEl;
  else if (!brewEl.value.trim()) target = brewEl;
  else                           target = nameEl;
  target.value = text;
  chip.classList.add('used');
  document.getElementById('ocr-status').textContent =
    (target === nameEl ? 'ミード名' : '醸造元') + 'に入力しました';
}

/* ────────────────────────────────
   PIN LOCK
──────────────────────────────── */
// 合言葉そのものは保存せず、SHA-256ハッシュ（一方向の変換値）だけを保持する
const PASS_HASH = '204be1f56ddc570e0ee5414224c4ddb4ed09b8856df06c2c79921d68402dc288';

async function sha256Hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPass(e) {
  e.preventDefault();
  const input = document.getElementById('pass-input');
  if (await sha256Hex(input.value) === PASS_HASH) {
    sessionStorage.setItem('ml_ok', '1');
    document.getElementById('lock-screen').style.display = 'none';
  } else {
    document.getElementById('lock-error').textContent = '合言葉が違います';
    input.value = '';
    setTimeout(() => {
      document.getElementById('lock-error').textContent = '';
    }, 1500);
  }
}
